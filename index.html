<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>המשחקים של המשפחה 🎮</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family:"Heebo",system-ui,sans-serif; direction:rtl; min-height:100vh;
    background:linear-gradient(160deg,#1a1440,#0f1420 60%); color:#fff;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:34px; padding:30px;
  }
  h1 { font-size:min(9vw,44px); font-weight:900; background:linear-gradient(90deg,#67e8f9,#a78bfa,#f0abfc);
    -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
  .cards { display:flex; gap:26px; flex-wrap:wrap; justify-content:center; }
  a.card {
    text-decoration:none; color:#fff; width:230px; padding:28px 20px; border-radius:24px; text-align:center;
    background:#ffffff10; border:2px solid #ffffff22; backdrop-filter:blur(8px);
    display:flex; flex-direction:column; align-items:center; gap:10px; transition:transform .15s;
  }
  a.card:active { transform:scale(.96); }
  .emoji { font-size:64px; }
  .name { font-size:24px; font-weight:900; }
  .desc { font-size:14px; color:#c7d2fe; }
  .milimon { border-color:#ff8a0055; }
  .gemquest { border-color:#a78bfa55; }
</style>
</head>
<body>
<h1>המשחקים של המשפחה 🎮</h1>
<div class="cards">
  <a class="card milimon" href="milimon/index.html">
    <div class="emoji">🎴</div>
    <div class="name">מִילִימוֹן</div>
    <div class="desc">תרגול קריאה — תפיסת מפלצות</div>
  </a>
  <a class="card gemquest" href="gemquest/index.html">
    <div class="emoji">💎</div>
    <div class="name">מסע היהלומים</div>
    <div class="desc">חשבון וקריאה — כיתה ה׳</div>
  </a>
</div>
</body>
</html>
